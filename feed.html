<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UNAC Forum — Explorar</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/feed.css" />
  </head>
  <body>
    <!-- FUNCIONALIDAD 3 - EXPLORAR EL FORO con FUNCIONALIDAD 5 - LIKE -->
    <header class="cabecera-sitio">
      <div class="cabecera-sitio-interior">
        <div class="marca-sitio">
          <h1 class="marca-sitio-titulo">UNAC Forum</h1>
          <p class="marca-sitio-subtitulo">
            Tablón de anuncios y temas de interés
          </p>
        </div>
        <div class="barra-usuario-cabecera">
          <span class="texto-usuario-activo"
            >Hola, <strong id="saludoUsuario"></strong
          ></span>
          <nav class="nav-cabecera-feed" aria-label="Acciones del foro">
            <a class="boton-primario" href="create-post.html">Nueva publicación</a>
            <button type="button" id="enlaceCerrarSesion" class="boton-secundario">
              Cerrar sesión
            </button>
          </nav>
        </div>
      </div>
    </header>
    <main>
      <div
        class="barra-herramientas-feed"
        role="search"
        aria-label="Buscar y filtrar publicaciones"
      >
        <div class="grupo-busqueda">
          <label for="inputBuscador">Buscar</label>
          <input
            id="inputBuscador"
            name="inputBuscador"
            type="search"
            placeholder="Título, texto o autor…"
            autocomplete="off"
          />
        </div>
        <div class="grupo-filtro-categoria">
          <label for="selectCategoria">Categoría</label>
          <select id="selectCategoria" name="selectCategoria">
            <option value="todas">Todas</option>
            <option value="convocatoria">Convocatoria</option>
            <option value="evento">Evento</option>
            <option value="alertaAcademica">Alerta académica</option>
            <option value="bienestar">Bienestar</option>
            <option value="tecnologia">Tecnología</option>
            <option value="deportes">Deportes</option>
            <option value="cultura">Cultura</option>
            <option value="general">General</option>
          </select>
        </div>
      </div>
      <div class="contenedor-feed-principal">
        <p id="textoFeedVacio" class="feed-vacio" hidden>
          No hay publicaciones que coincidan con tu búsqueda o categoría.
        </p>
        <div id="contenedorFeed" class="contenedor-feed"></div>
      </div>
    </main>
    <footer class="pie-sitio">
      <p>Proyecto parcial - HTML, CSS y JavaScript.</p>
    </footer>
    <!-- datos.js primero; feed.js dibuja el listado y maneja likes. -->
    <script src="js/datos.js"></script>
    <script src="js/feed.js"></script>
  </body>
</html>
